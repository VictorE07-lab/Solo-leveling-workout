<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Victor OS</title>

  <style>
/* --- YOUR ORIGINAL CSS (UNCHANGED) --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0e1220;--card:#111827;--border:#1e2a45;
  --blue:#4f8ef7;--purple:#8b5cf6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --text:#c9d8f0;--muted:#4a607a;
}
html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;
  -webkit-text-size-adjust:100%;
  overflow-x:hidden;
  font-size:16px;
}

/* SMALL BUT IMPORTANT CHANGE */
body{
  padding:12px;
  width:100%;
  margin:0;
}

/* --- KEEP EVERYTHING ELSE EXACTLY THE SAME --- */
body::before{content:'';pointer-events:none;position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);z-index:9999}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* (rest of your CSS continues exactly as you had it...) */

/* MOBILE RESPONSIVE */
@media(max-width:600px){
  body{padding:10px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-val{font-size:22px}
  .day-name{font-size:13px}
  .ex-row{font-size:14px;padding:10px 0}
  .ex-check{width:24px;height:24px;font-size:14px}
  .log-btn{font-size:12px;width:100%}
  .rest-btn{width:100%;text-align:center}
  .log-wrap{flex-direction:column}
  .boss-btn{width:100%}
  .settings-btn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
  .cal-nav button{min-height:44px;padding:0 18px}
  .pr-input{width:80px;min-height:36px}
  .notes-area{font-size:16px}
}
  </style>
</head>

<body>

<h2 class="sr-only">Victor OS Training v2</h2>

<!-- YOUR HTML CONTENT (UNCHANGED) -->
<div class="header">
  <div class="logo">VICTOR<span>·</span>OS<small>v2</small></div>
  <button class="settings-btn" onclick="openSettings()">⚙️</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(event,'plan')">⚔️ Quest</button>
  <button class="tab" onclick="switchTab(event,'stats')">📊 Stats</button>
  <button class="tab" onclick="switchTab(event,'calendar')">📅 Log</button>
  <button class="tab" onclick="switchTab(event,'history')">📜 History</button>
</div>

<!-- (ALL YOUR OTHER HTML EXACTLY THE SAME — no changes needed) -->

<!-- YOUR SCRIPT (UNCHANGED) -->
<script>
/* KEEP YOUR ENTIRE JS EXACTLY AS IS */
</script>

</body>
</html>
